<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proof of Pulse iPhone Mockup</title>
    <style>
      :root {
        --page-bg: #202322;
        --phone-bg: #333;
        --ink: #f4fffb;
        --muted: #9bb2ac;
        --muted-2: #6f837d;
        --line: rgba(255, 255, 255, 0.1);
        --panel: rgba(255, 255, 255, 0.055);
        --panel-strong: rgba(255, 255, 255, 0.095);
        --green: hsl(160 100% 55%);
        --cyan: hsl(180 100% 55%);
        --blue: hsl(205 100% 57%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 42% 24%, rgba(0, 255, 185, 0.14), transparent 26rem),
          linear-gradient(145deg, #202322 0%, #111312 100%);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .stage {
        width: min(100vw, 980px);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .phone {
        position: relative;
        width: min(390px, calc(100vw - 36px));
        aspect-ratio: 390 / 844;
        border: 10px solid #0b0d0c;
        border-radius: 44px;
        background: var(--phone-bg);
        overflow: hidden;
        box-shadow:
          0 42px 90px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.08),
          inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      .phone::before {
        content: "";
        position: absolute;
        z-index: 3;
        top: 12px;
        left: 50%;
        width: 116px;
        height: 28px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: #080a09;
      }

      .screen {
        position: absolute;
        inset: 0;
        padding: 24px 20px 20px;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 18px;
        background:
          radial-gradient(circle at 50% 36%, rgba(0, 255, 191, 0.12), transparent 9rem),
          radial-gradient(circle at 72% 62%, rgba(0, 180, 255, 0.08), transparent 10rem),
          #333;
      }

      .status {
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: rgba(255, 255, 255, 0.88);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .system {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .signal {
        display: grid;
        grid-template-columns: repeat(4, 3px);
        gap: 2px;
        align-items: end;
        height: 11px;
      }

      .signal span {
        width: 3px;
        border-radius: 2px;
        background: currentColor;
      }

      .signal span:nth-child(1) {
        height: 4px;
      }

      .signal span:nth-child(2) {
        height: 6px;
      }

      .signal span:nth-child(3) {
        height: 8px;
      }

      .signal span:nth-child(4) {
        height: 10px;
      }

      .battery {
        width: 20px;
        height: 10px;
        border: 1.5px solid currentColor;
        border-radius: 3px;
        position: relative;
      }

      .battery::before {
        content: "";
        position: absolute;
        top: 2px;
        right: -4px;
        width: 2px;
        height: 4px;
        border-radius: 0 2px 2px 0;
        background: currentColor;
      }

      .battery::after {
        content: "";
        position: absolute;
        inset: 2px 5px 2px 2px;
        border-radius: 1px;
        background: currentColor;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 12px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-size: 28px;
        line-height: 1;
        letter-spacing: 0;
      }

      .chip {
        display: inline-grid;
        grid-template-columns: 7px auto;
        align-items: center;
        gap: 8px;
        min-height: 30px;
        padding: 0 11px;
        border-radius: 999px;
        border: 1px solid rgba(0, 255, 190, 0.32);
        color: #ccfff2;
        background: rgba(0, 255, 191, 0.08);
        font-size: 12px;
        font-weight: 700;
      }

      .chip::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 12px 4px rgba(0, 255, 190, 0.42);
      }

      .hero {
        align-self: stretch;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 26px;
        min-height: 315px;
        padding: 18px 0 8px;
      }

      .pulse-field {
        position: relative;
        width: 100%;
        height: 150px;
        display: grid;
        place-items: center;
      }

      .pulse-field::before,
      .pulse-field::after {
        content: "";
        position: absolute;
        left: 22px;
        right: 22px;
        top: 50%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 255, 190, 0.28),
          rgba(0, 190, 255, 0.24),
          transparent
        );
      }

      .pulse-field::after {
        transform: translateY(30px);
        opacity: 0.35;
      }

      .dots {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 30px;
      }

      .dot {
        --hue: 160;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: hsl(var(--hue) 100% 61%);
        animation: pulse 2s ease-out infinite;
        animation-delay: calc(var(--index) * 0.25s);
        box-shadow:
          0 0 0 0 hsla(var(--hue) 100% 58% / 0),
          0 0 0 0 rgba(51, 51, 51, 0),
          0 0 0 0 hsla(var(--hue) 100% 58% / 0);
      }

      .dot:nth-child(1) {
        --hue: 160;
        --index: 0;
      }

      .dot:nth-child(2) {
        --hue: 170;
        --index: 1;
      }

      .dot:nth-child(3) {
        --hue: 180;
        --index: 2;
      }

      .dot:nth-child(4) {
        --hue: 190;
        --index: 3;
      }

      .dot:nth-child(5) {
        --hue: 200;
        --index: 4;
      }

      .dot:nth-child(6) {
        --hue: 210;
        --index: 5;
      }

      @keyframes pulse {
        0% {
          box-shadow:
            0 0 0 0 hsla(var(--hue) 100% 58% / 0),
            0 0 0 0 rgba(51, 51, 51, 0),
            0 0 0 0 hsla(var(--hue) 100% 58% / 0);
          transform: translateY(0) scale(0.96);
        }

        10% {
          box-shadow:
            0 0 8px 5px hsla(var(--hue) 100% 58% / 0.92),
            0 0 12px 10px var(--phone-bg),
            0 0 12px 14px hsla(var(--hue) 100% 58% / 0.88);
          transform: translateY(-3px) scale(1);
        }

        100% {
          box-shadow:
            0 0 0 0 hsla(var(--hue) 100% 58% / 0),
            0 0 0 40px rgba(51, 51, 51, 0),
            0 0 0 40px hsla(var(--hue) 100% 58% / 0);
          transform: translateY(0) scale(0.96);
        }
      }

      .claim {
        width: 100%;
        display: grid;
        justify-items: center;
        gap: 10px;
      }

      .claim h2 {
        margin: 0;
        max-width: 290px;
        text-align: center;
        color: var(--ink);
        font-size: 31px;
        line-height: 1.02;
        letter-spacing: 0;
      }

      .claim p {
        margin: 0;
        max-width: 278px;
        color: var(--muted);
        text-align: center;
        font-size: 14px;
        line-height: 1.45;
      }

      .proof-panel {
        align-self: end;
        display: grid;
        gap: 14px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, var(--panel-strong), var(--panel));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .meter {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      .meter-title {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .value {
        color: var(--ink);
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .score {
        width: 64px;
        height: 64px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        color: var(--ink);
        font-size: 19px;
        font-weight: 900;
        background:
          radial-gradient(circle at center, #333 49%, transparent 51%),
          conic-gradient(var(--green) 0 76%, rgba(255, 255, 255, 0.12) 76% 100%);
        box-shadow: 0 0 24px rgba(0, 255, 191, 0.2);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .metric {
        min-width: 0;
        padding: 11px 9px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.12);
      }

      .metric strong {
        display: block;
        color: var(--ink);
        font-size: 15px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .metric span {
        display: block;
        margin-top: 6px;
        color: var(--muted-2);
        font-size: 11px;
        line-height: 1.2;
      }

      .cta {
        width: 100%;
        min-height: 54px;
        border: 0;
        border-radius: 8px;
        color: #05251d;
        background: linear-gradient(90deg, var(--green), var(--cyan), var(--blue));
        font: inherit;
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 0;
        box-shadow:
          0 10px 26px rgba(0, 255, 190, 0.2),
          0 0 0 1px rgba(255, 255, 255, 0.12) inset;
      }

      .nav {
        height: 58px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        align-items: center;
        padding: 0 10px 2px;
        border-top: 1px solid var(--line);
      }

      .nav-item {
        display: grid;
        justify-items: center;
        gap: 6px;
        color: var(--muted-2);
        font-size: 10px;
        font-weight: 800;
      }

      .nav-icon {
        width: 20px;
        height: 20px;
        border-radius: 999px;
        border: 2px solid currentColor;
        position: relative;
      }

      .nav-item.active {
        color: #c8fff1;
      }

      .nav-item.active .nav-icon {
        color: var(--green);
        box-shadow: 0 0 16px rgba(0, 255, 190, 0.32);
      }

      .nav-item:nth-child(2) .nav-icon {
        border-radius: 7px;
      }

      .nav-item:nth-child(3) .nav-icon::after {
        content: "";
        position: absolute;
        inset: 4px;
        border-radius: 999px;
        background: currentColor;
      }

      @media (max-width: 430px) {
        .stage {
          padding: 18px;
        }

        .phone {
          border-width: 8px;
        }

        .screen {
          padding-inline: 17px;
        }

        .dots {
          gap: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="phone" aria-label="Proof of Pulse iPhone app mockup">
        <div class="screen">
          <div class="status">
            <span>9:41</span>
            <div class="system" aria-hidden="true">
              <span class="signal"><span></span><span></span><span></span><span></span></span>
              <span class="battery"></span>
            </div>
          </div>

          <header class="topbar">
            <div class="brand">
              <span class="eyebrow">Proof of</span>
              <h1>Pulse</h1>
            </div>
            <span class="chip">Live</span>
          </header>

          <section class="hero">
            <div class="pulse-field" aria-hidden="true">
              <div class="dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
              </div>
            </div>
            <div class="claim">
              <h2>Your pulse proof is ready</h2>
              <p>Recent wearable-backed signals can be turned into a short-lived private proof.</p>
            </div>
          </section>

          <section class="proof-panel" aria-label="Pulse proof summary">
            <div class="meter">
              <div class="meter-title">
                <span class="label">Signal confidence</span>
                <span class="value">Watch likely</span>
              </div>
              <div class="score">76</div>
            </div>

            <div class="metrics">
              <div class="metric">
                <strong>Fresh</strong>
                <span>under 6h</span>
              </div>
              <div class="metric">
                <strong>4 modes</strong>
                <span>detected</span>
              </div>
              <div class="metric">
                <strong>ZK</strong>
                <span>private</span>
              </div>
            </div>

            <button class="cta" type="button">Create Pulse Proof</button>
          </section>

          <nav class="nav" aria-label="App sections">
            <div class="nav-item active">
              <span class="nav-icon"></span>
              <span>Pulse</span>
            </div>
            <div class="nav-item">
              <span class="nav-icon"></span>
              <span>Proofs</span>
            </div>
            <div class="nav-item">
              <span class="nav-icon"></span>
              <span>Keys</span>
            </div>
          </nav>
        </div>
      </section>
    </main>
  </body>
</html>
